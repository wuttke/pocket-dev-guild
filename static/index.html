<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <title>Pocket Dev Guild</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 2rem; max-width: 960px; }
    pre { background: #111; color: #eee; padding: 1rem; max-height: 70vh; overflow: auto; }
    label { display: block; margin-top: 0.5rem; }
    input, textarea, select { width: 100%; padding: 0.4rem; box-sizing: border-box; }
    button { margin-top: 0.75rem; padding: 0.5rem 1rem; }
    .row { display: flex; gap: 1rem; }
    .row > * { flex: 1; }
  </style>
</head>
<body>
  <h1>Pocket Dev Guild</h1>

  <div class="row">
    <div>
      <label>Repo
        <select id="repo"></select>
      </label>
      <label>Worktree
        <select id="worktree"></select>
      </label>
      <button id="reload">Worktrees neu laden</button>
      <button id="delete-worktree">Worktree löschen</button>
    </div>
    <div>
      <label>Neuer Branch
        <input id="new-branch" placeholder="feature/foo" />
      </label>
      <label><input type="checkbox" id="existing-branch" /> existierenden Branch auschecken</label>
      <button id="create-worktree">Worktree anlegen</button>
    </div>
  </div>

  <h2>Conversation</h2>
  <div class="row">
    <div>
      <label>Conversation
        <select id="conversation"></select>
      </label>
      <button id="reload-conversations">neu laden</button>
      <button id="archive-conversation">Archivieren</button>
    </div>
    <div>
      <label>Titel (für neue Conversation)
        <input id="conversation-title" placeholder="optional" />
      </label>
      <button id="new-conversation">Neue Conversation</button>
    </div>
  </div>
  <div id="conversation-info" style="margin-top:0.5rem;font-size:0.9em;color:#555;white-space:pre-wrap;"></div>

  <label>Prompt
    <textarea id="prompt" rows="4" placeholder="Was soll augment tun?"></textarea>
  </label>
  <div class="row">
    <button id="run">one-shot starten</button>
    <button id="send-turn">Turn senden</button>
  </div>

  <h2>Log</h2>
  <pre id="log"></pre>

<script>
const $ = (id) => document.getElementById(id);
const log = $("log");
let source = null;

async function loadRepos() {
  const r = await fetch("/repos").then(r => r.json());
  $("repo").innerHTML = r.map(x => `<option value="${x.id}">${x.name}</option>`).join("");
  await loadWorktrees();
}

async function loadWorktrees() {
  const repoId = $("repo").value;
  if (!repoId) return;
  const r = await fetch(`/repos/${repoId}/worktrees`).then(r => r.json());
  // Primary checkout uses value="" -> sent as worktree: null to the API.
  $("worktree").innerHTML = r
    .map(w => {
      const ref = w.branch || w.head || "";
      if (w.is_primary) {
        return `<option value="">&lt;primary&gt; (${ref})</option>`;
      }
      return `<option value="${w.name}">${w.name} (${ref})</option>`;
    })
    .join("");
}

async function createWorktree() {
  const repoId = $("repo").value;
  const branch = $("new-branch").value.trim();
  if (!branch) return;
  const existing = $("existing-branch").checked;
  const url = `/repos/${repoId}/worktrees${existing ? "?existing=true" : ""}`;
  const res = await fetch(url, {
    method: "POST",
    headers: {"content-type": "application/json"},
    body: JSON.stringify({branch}),
  });
  if (!res.ok) { alert(await res.text()); return; }
  $("new-branch").value = "";
  $("existing-branch").checked = false;
  await loadWorktrees();
}

async function deleteWorktree() {
  const repoId = $("repo").value;
  const name = $("worktree").value;
  if (!name) { alert("Primary checkout kann nicht gelöscht werden."); return; }
  if (!confirm(`Worktree '${name}' wirklich löschen?`)) return;
  const res = await fetch(`/repos/${repoId}/worktrees/${name}`, {method: "DELETE"});
  if (!res.ok) { alert(await res.text()); return; }
  await loadWorktrees();
}

async function runAugment() {
  const repoId = $("repo").value;
  const name = $("worktree").value;
  const prompt = $("prompt").value;
  if (!prompt) return;

  log.textContent = "";
  const res = await fetch(`/jobs`, {
    method: "POST",
    headers: {"content-type": "application/json"},
    body: JSON.stringify({repo_id: repoId, worktree: name || null, prompt}),
  });
  if (!res.ok) { alert(await res.text()); return; }
  const {job_id} = await res.json();
  const startedAt = Date.now();
  log.textContent = `--- Job ${job_id} started ${new Date(startedAt).toISOString()} ---\n`;

  if (source) source.close();
  source = new EventSource(`/jobs/${job_id}/events`);
  source.addEventListener("log", (event) => {
    const entry = JSON.parse(event.data);
    log.textContent += `[${entry.stream}] ${entry.line}`;
    log.scrollTop = log.scrollHeight;
  });
  source.addEventListener("status", (event) => {
    const status = JSON.parse(event.data);
    const finishedAt = status.finished_at ? Date.parse(status.finished_at) : Date.now();
    const durationS = ((finishedAt - startedAt) / 1000).toFixed(1);
    log.textContent += `\n--- Job ${status.status} (rc=${status.returncode}) after ${durationS}s ---\n`;
    source.close();
  });
  source.addEventListener("error", () => source.close());
}

function renderConversationInfo(info, busy) {
  const el = $("conversation-info");
  if (!info) { el.textContent = ""; return; }
  const lines = [
    `id: ${info.id}`,
    `title: ${info.title || "—"}`,
    `worktree: ${info.worktree || "<primary>"}`,
    `turns: ${info.turns.length}  busy: ${busy}`,
    `session_id: ${info.session_id || "—"}`,
    `summary: ${info.summary || "—"}`,
  ];
  el.textContent = lines.join("\n");
}

let conversationSource = null;
function openConversationStream(conversationId) {
  if (conversationSource) conversationSource.close();
  if (!conversationId) { renderConversationInfo(null, false); return; }
  conversationSource = new EventSource(`/conversations/${conversationId}/events`);
  const onPayload = (event) => {
    const data = JSON.parse(event.data);
    renderConversationInfo(data.conversation, data.busy);
  };
  conversationSource.addEventListener("snapshot", onPayload);
  conversationSource.addEventListener("update", onPayload);
  conversationSource.addEventListener("error", () => {});
}

async function loadConversations(preferId) {
  const repoId = $("repo").value;
  if (!repoId) return;
  const resp = await fetch(`/conversations?repo_id=${repoId}`).then(r => r.json());
  const r = resp.items || [];
  $("conversation").innerHTML = [
    `<option value="">— keine —</option>`,
    ...r.map(c => {
      const label = c.title || c.summary || c.id.slice(0, 8);
      const wt = c.worktree || "<primary>";
      return `<option value="${c.id}">${label} · ${wt} · ${c.turns.length}t</option>`;
    }),
  ].join("");
  if (preferId && r.some(c => c.id === preferId)) {
    $("conversation").value = preferId;
  }
  openConversationStream($("conversation").value);
}

async function archiveConversation() {
  const conversationId = $("conversation").value;
  if (!conversationId) { alert("Keine Conversation gewählt."); return; }
  if (!confirm("Conversation wirklich archivieren?")) return;
  const res = await fetch(`/conversations/${conversationId}`, {method: "DELETE"});
  if (!res.ok && res.status !== 204) { alert(await res.text()); return; }
  await loadConversations();
}

async function newConversation() {
  const repoId = $("repo").value;
  const worktree = $("worktree").value || null;
  const title = $("conversation-title").value.trim() || null;
  const res = await fetch(`/conversations`, {
    method: "POST",
    headers: {"content-type": "application/json"},
    body: JSON.stringify({repo_id: repoId, worktree, title}),
  });
  if (!res.ok) { alert(await res.text()); return; }
  const info = await res.json();
  $("conversation-title").value = "";
  await loadConversations(info.id);
}

async function sendTurn() {
  const conversationId = $("conversation").value;
  if (!conversationId) { alert("Keine Conversation gewählt."); return; }
  const prompt = $("prompt").value;
  if (!prompt) return;
  const res = await fetch(`/conversations/${conversationId}/turns`, {
    method: "POST",
    headers: {"content-type": "application/json"},
    body: JSON.stringify({prompt}),
  });
  if (!res.ok) { alert(await res.text()); return; }
  const {job_id} = await res.json();
  const startedAt = Date.now();
  log.textContent = `--- Turn ${job_id} started ${new Date(startedAt).toISOString()} ---\n`;
  if (source) source.close();
  source = new EventSource(`/jobs/${job_id}/events`);
  source.addEventListener("log", (event) => {
    const entry = JSON.parse(event.data);
    log.textContent += `[${entry.stream}] ${entry.line}`;
    log.scrollTop = log.scrollHeight;
  });
  source.addEventListener("status", (event) => {
    const status = JSON.parse(event.data);
    const finishedAt = status.finished_at ? Date.parse(status.finished_at) : Date.now();
    const durationS = ((finishedAt - startedAt) / 1000).toFixed(1);
    log.textContent += `\n--- Turn ${status.status} (rc=${status.returncode}) after ${durationS}s ---\n`;
    source.close();
  });
  source.addEventListener("error", () => source.close());
}

$("repo").addEventListener("change", async () => {
  await loadWorktrees();
  await loadConversations();
});
$("reload").addEventListener("click", loadWorktrees);
$("create-worktree").addEventListener("click", createWorktree);
$("delete-worktree").addEventListener("click", deleteWorktree);
$("run").addEventListener("click", runAugment);
$("reload-conversations").addEventListener("click", () => loadConversations());
$("archive-conversation").addEventListener("click", archiveConversation);
$("new-conversation").addEventListener("click", newConversation);
$("conversation").addEventListener("change", () => openConversationStream($("conversation").value));
$("send-turn").addEventListener("click", sendTurn);
(async () => { await loadRepos(); await loadConversations(); })();
</script>
</body>
</html>
