# Optional: which agent binary to invoke and how to pass the prompt.
# Defaults shown below.
# agent_binary: auggie
# agent_prompt_param: --print

# Optional: MongoDB connection URL for job and conversation persistence.
# If not specified, uses in-memory stores (data lost on restart).
#
# Examples:
#   Local without auth: mongodb://localhost:27017/pocket_dev_guild
#   With auth:          mongodb://username:password@localhost:27017/pocket_dev_guild
#   Remote MongoDB:     mongodb://user:pass@mongo.example.com:27017/pocket_dev_guild
#
# mongodb_url: mongodb://localhost:27017/pocket_dev_guild

repos:
  - id: example
    name: example
    path: /absolute/path/to/example-repo
