version: '3.8'

services:
  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      - MONGODB_URL=mongodb://mongodb:27017/pocket_dev_guild
    volumes:
      # Optional: Mount your repositories directory
      # - /path/to/your/repos:/repos
      # Optional: Mount custom config
      # - ./config.yaml:/app/config.yaml
    depends_on:
      - mongodb
    restart: unless-stopped

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

volumes:
  mongodb_data:
